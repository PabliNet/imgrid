name: Build binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  # ─── imgrid (CLI) ── Linux y Windows ──────────────────────────────────────
  build-imgrid:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: imgrid
          - os: windows-latest
            artifact: imgrid.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build imgrid
        run: >
          pyinstaller
          --onefile
          --name ${{ matrix.artifact }}
          src/imgrid.py

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}


  # ─── qtimgrid (PySide6) ── Linux y Windows ────────────────────────────────
  build-qtimgrid:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: qtimgrid
            extra_deps: >-
              libgl1
              libglib2.0-0
              libdbus-1-3
              libxcb-xinerama0
              libxcb-icccm4
              libxcb-image0
              libxcb-keysyms1
              libxcb-render-util0
              libxcb-shape0
          - os: windows-latest
            artifact: qtimgrid.exe
            extra_deps: ''

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Solo en Linux: instalar librerías de sistema que PySide6 necesita
      - name: Install system libraries (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y ${{ matrix.extra_deps }}

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller PySide6

      - name: Build qtimgrid
        run: |
          # Ruta base de PySide6 instalado por pip
          PYSIDE6=$(python -c "import PySide6; import os; print(os.path.dirname(PySide6.__file__))")

          # Argumentos comunes
          ARGS=(
            --onefile
            --windowed
            --name "${{ matrix.artifact }}"
          )

          if [ "$RUNNER_OS" = "Linux" ]; then
            # Incluir plugin platformthemes/plasma (si existe en el sistema)
            PLASMA_PLUGIN=$(find /usr -name "libqt6ct.so" -o -name "libqgnomeplatform.so" 2>/dev/null | head -1)
            if [ -n "$PLASMA_PLUGIN" ]; then
              ARGS+=(--add-binary "${PLASMA_PLUGIN}:PySide6/Qt/plugins/platformthemes")
            fi
            ARGS+=(--add-data "imgrid.svg:.")
          else
            ARGS+=(--add-data "imgrid.svg;.")
          fi

          pyinstaller "${ARGS[@]}" src/qtimgrid.py

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}


  # ─── gtkimgrid (GTK4) ── solo Linux ───────────────────────────────────────
  build-gtkimgrid:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-gi \
            python3-gi-cairo \
            gir1.2-gtk-4.0 \
            gir1.2-gdkpixbuf-2.0 \
            libgtk-4-dev \
            gobject-introspection \
            libgirepository-2.0-dev \
            gir1.2-girepository-2.0 \
            pkg-config

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller PyGObject

      - name: Copy GTK hook to hooks directory
        run: |
          mkdir -p hooks
          cp hooks-src/hook-gi.repository.Gtk.py hooks/

      - name: Build gtkimgrid
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name gtkimgrid \
            --add-data "imgrid.svg:." \
            --add-data "/usr/share/glib-2.0/schemas:share/glib-2.0/schemas" \
            --additional-hooks-dir hooks \
            src/gtkimgrid.py

      - uses: actions/upload-artifact@v4
        with:
          name: gtkimgrid
          path: dist/gtkimgrid


  # ─── Release: adjunta todos los binarios ──────────────────────────────────
  release:
    needs: [build-imgrid, build-qtimgrid, build-gtkimgrid]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
