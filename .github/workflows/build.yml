name: Build binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  # ─── imgrid (CLI) ── solo Windows ─────────────────────────────────────────
  build-imgrid:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller
      - name: Build imgrid
        run: pyinstaller --onefile --name imgrid.exe src/imgrid.py
      - uses: actions/upload-artifact@v4
        with:
          name: imgrid.exe
          path: dist/imgrid.exe


  # ─── qtimgrid (PySide6) ── solo Windows ───────────────────────────────────
  build-qtimgrid:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller PySide6
      - name: Build qtimgrid
        run: >
          pyinstaller --onefile --windowed --name qtimgrid.exe
          --add-data "imgrid.svg;." src/qtimgrid.py
      - uses: actions/upload-artifact@v4
        with:
          name: qtimgrid.exe
          path: dist/qtimgrid.exe


  # ─── imgridroid (Kivy) ── Android ─────────────────────────────────────────
  build-imgridroid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Convert SVG icon to PNG for buildozer
        run: |
          sudo apt-get install -y librsvg2-bin
          rsvg-convert -w 512 -h 512 imgrid.svg -o imgridroid/src/icon.png

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: .buildozer_global
          key: buildozer-global-${{ hashFiles('imgridroid/buildozer.spec') }}

      - name: Cache Buildozer project directory
        uses: actions/cache@v4
        with:
          path: imgridroid/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('imgridroid/buildozer.spec') }}

      - name: Pull kivy/buildozer image
        run: docker pull kivy/buildozer:latest

      - name: Build Imgridroid APK
        run: |
          mkdir -p "${{ github.workspace }}/.buildozer_global"
          docker run --rm \
            --volume "${{ github.workspace }}/.buildozer_global":/home/user/.buildozer \
            --volume "${{ github.workspace }}/imgridroid":/home/user/hostcwd \
            kivy/buildozer:latest android debug

      - name: Fix permissions after container build
        if: always()
        run: |
          sudo chown -R "$(id -u):$(id -g)" \
            "${{ github.workspace }}/imgridroid" \
            "${{ github.workspace }}/.buildozer_global"

      - name: Install apktool
        run: |
          sudo apt-get install -y apktool

      - name: Patch APK (add FileProvider + intent-filters)
        run: |
          APK=$(find imgridroid/bin -name '*.apk' | head -n 1)
          echo "APK original: $APK"

          # Desempaquetar
          apktool d "$APK" -o /tmp/apk_unpacked -f

          # Parchear el manifest
          python3 imgridroid/src/patch_manifest.py /tmp/apk_unpacked/AndroidManifest.xml

          # Reempaquetar
          apktool b /tmp/apk_unpacked -o /tmp/imgridroid_patched_unsigned.apk

          # Firmar con apksigner (genera v1+v2, necesario para Android 11+)
          # jarsigner solo genera v1, que Android 11+ rechaza en algunos casos.
          KEYSTORE="$HOME/.android/debug.keystore"
          mkdir -p "$HOME/.android"
          if [ ! -f "$KEYSTORE" ]; then
            keytool -genkey -v -keystore "$KEYSTORE" \
              -alias androiddebugkey -keyalg RSA -keysize 2048 \
              -validity 10000 -storepass android -keypass android \
              -dname "CN=Android Debug,O=Android,C=US"
          fi
          # apksigner está en el Android SDK del runner
          APKSIGNER=$(find /usr/local/lib/android/sdk/build-tools -name "apksigner" | sort -V | tail -1)
          echo "Usando apksigner: $APKSIGNER"
          "$APKSIGNER" sign \
            --ks "$KEYSTORE" \
            --ks-key-alias androiddebugkey \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "$APK" \
            /tmp/imgridroid_patched_unsigned.apk
          echo "APK parcheado y firmado: $APK"

      - name: Locate built APK
        id: locate_apk
        run: |
          APK_PATH=$(find imgridroid/bin -name '*.apk' | head -n 1)
          echo "Found: $APK_PATH"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: imgridroid.apk
          path: ${{ steps.locate_apk.outputs.apk_path }}


  # ─── Release ──────────────────────────────────────────────────────────────
  release:
    needs: [build-imgrid, build-qtimgrid, build-imgridroid]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
