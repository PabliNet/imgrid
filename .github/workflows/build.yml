name: Build binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  # ─── imgrid (CLI) ── solo Windows ─────────────────────────────────────────
  build-imgrid:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build imgrid
        run: >
          pyinstaller
          --onefile
          --name imgrid.exe
          src/imgrid.py

      - uses: actions/upload-artifact@v4
        with:
          name: imgrid.exe
          path: dist/imgrid.exe


  # ─── qtimgrid (PySide6) ── solo Windows ───────────────────────────────────
  build-qtimgrid:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller PySide6

      - name: Build qtimgrid
        run: >
          pyinstaller
          --onefile
          --windowed
          --name qtimgrid.exe
          --add-data "imgrid.svg;."
          src/qtimgrid.py

      - uses: actions/upload-artifact@v4
        with:
          name: qtimgrid.exe
          path: dist/qtimgrid.exe


  # ─── imgridroid (Kivy) ── Android ─────────────────────────────────────────
  build-imgridroid:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # El proyecto Android vive en su propia carpeta (imgridroid/), con
      # su propio buildozer.spec y código fuente en imgridroid/src/.
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-global-${{ hashFiles('imgridroid/buildozer.spec') }}

      - name: Cache Buildozer project directory
        uses: actions/cache@v4
        with:
          path: imgridroid/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('imgridroid/buildozer.spec') }}

      - name: Build Imgridroid APK
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          workdir: imgridroid
          buildozer_version: stable
          command: buildozer android debug

      - uses: actions/upload-artifact@v4
        with:
          name: imgridroid.apk
          path: ${{ steps.buildozer.outputs.filename }}


  # ─── Release: adjunta todos los binarios ──────────────────────────────────
  release:
    needs: [build-imgrid, build-qtimgrid, build-imgridroid]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
